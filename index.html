 <!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Vitals | Login</title>
  <style>    
    body{
  font-family:Arial;
  margin:0;
  background:#0b1220;
  color:#e8eefc;
}

{
  box-sizing: border-box;
}

.wrap{
  max-width:420px;
  margin:12vh auto;
  padding:20px;
}

.card{
  background:#121b2f;
  border-radius:16px;
  padding:24px; 
}

input,button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #2a3557;
  background:#0b1220;
  color:#e8eefc;
  margin:0;   
}

button{
  border:none;
  background:#3b82f6;
  font-weight:800;
  cursor:pointer;
}

.err{
  color:#ff8a8a;
  margin-top:10px;
  min-height:18px;
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Vitals Monitor Login</h2>
      <input id="u" placeholder="Username">
      <div style="height:10px"></div>
      <input id="p" placeholder="Password" type="password">
      <div style="height:14px"></div>
      <button onclick="login()">Login</button>
      <div id="msg" class="err"></div>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyq_bBuTZ9mHP93xgHiCfyrx7ttUZVn8Rnu8oPeKkApaH_rDT0CBa1idgf0BoNkyzpSqQ/exec";

async function postForm(payload){
  const body = new URLSearchParams(payload).toString();
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded;charset=UTF-8" },
    body
  });
  return res.json();
}

async function login(){
  document.getElementById("msg").textContent = "";
  const username = document.getElementById("u").value.trim();
  const password = document.getElementById("p").value.trim();

  const data = await postForm({ action:"login", username, password });

  if(!data.ok){
    document.getElementById("msg").textContent = data.error || "Login failed";
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("profile", JSON.stringify(data.profile));

  location.href = (data.profile.role === "DOCTOR") ? "doctor.html" : "patient.html";
}
</script>
</body>
</html>
