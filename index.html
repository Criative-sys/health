<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health Monitoring | Login</title>
  <style>
    body{font-family:Arial;margin:0;background:#0b1220;color:#e8eefc}
    .wrap{max-width:420px;margin:10vh auto;padding:24px;background:#121b2f;border-radius:16px}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #2a3557;background:#0b1220;color:#e8eefc}
    button{border:none;background:#3b82f6;font-weight:700;cursor:pointer}
    .muted{opacity:.8;font-size:13px}
    .err{color:#ff8a8a;margin-top:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Web-Based Monitoring Platform</h2>
    <p class="muted">Login as Patient or Doctor.</p>

    <input id="u" placeholder="Username" />
    <div style="height:10px"></div>
    <input id="p" placeholder="Password" type="password" />
    <div style="height:14px"></div>
    <button onclick="login()">Login</button>
    <div id="msg" class="err"></div>

    <p class="muted" style="margin-top:18px">
      Free stack: GitHub Pages + Google Sheets + Apps Script.
    </p>
  </div>

<script>
const API_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

async function login(){
  document.getElementById("msg").textContent = "";
  const username = document.getElementById("u").value.trim();
  const password = document.getElementById("p").value.trim();

  const r = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action:"login", username, password })
  });

  const data = await r.json();
  if(!data.ok){
    document.getElementById("msg").textContent = data.error || "Login failed";
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("profile", JSON.stringify(data.profile));

  if(data.profile.role === "DOCTOR") location.href = "doctor.html";
  else location.href = "patient.html";
}
</script>
</body>
</html>
