<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Patient Dashboard</title>
  <style>
    body{font-family:Arial;margin:0;background:#0b1220;color:#e8eefc}
    header{padding:16px 18px;background:#121b2f;display:flex;justify-content:space-between;align-items:center}
    .wrap{max-width:1100px;margin:18px auto;padding:0 14px}
    .card{background:#121b2f;border-radius:16px;padding:16px;margin-bottom:14px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid #2a3557;padding:8px;text-align:left;font-size:14px}
    .pill{display:inline-block;padding:6px 10px;border:1px solid #2a3557;border-radius:999px;margin:4px 6px 0 0;background:#0b1220}
    button{padding:10px 12px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
<header>
  <div>
    <div style="font-weight:900">Patient Dashboard</div>
    <div id="pid" style="opacity:.8;font-size:13px"></div>
  </div>
  <button onclick="logout()">Logout</button>
</header>

<div class="wrap">
  <div class="card">
    <h3>Latest</h3>
    <div id="latest"></div>
  </div>

  <div class="card">
    <h3>Alerts</h3>
    <div id="alerts"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyq_bBuTZ9mHP93xgHiCfyrx7ttUZVn8Rnu8oPeKkApaH_rDT0CBa1idgf0BoNkyzpSqQ/exec";

function getProfile(){ const p=localStorage.getItem("profile"); return p?JSON.parse(p):null; }
function getToken(){ return localStorage.getItem("token"); }
function logout(){ localStorage.clear(); location.href="index.html"; }

async function postForm(payload){
  const body = new URLSearchParams(payload).toString();
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded;charset=UTF-8" },
    body
  });
  return res.json();
}

async function init(){
  const profile = getProfile();
  if(!profile || profile.role !== "PATIENT") return logout();
  document.getElementById("pid").textContent = "Patient ID: " + profile.patientId;

  await loadAll();
  setInterval(loadAll, 5000);
}

async function loadAll(){
  const profile = getProfile();

  // summary
  const s = await postForm({ action:"getPatientSummary", token:getToken(), patientId: profile.patientId });
  if(!s.ok) return;

  const latest = s.latest || {};
  document.getElementById("latest").innerHTML =
    Object.keys(latest).map(k=>{
      const r = latest[k];
      return `<span class="pill">${r.type}: <b>${r.value}</b> ${r.unit||""}</span>`;
    }).join("") || "<span style='opacity:.8'>No readings yet.</span>";

  document.getElementById("alerts").innerHTML =
    (s.alerts||[]).slice(0,20).map(a=>`
      <div style="padding:8px 0;border-bottom:1px solid #2a3557">
        <div><b>${a.type}</b> = ${a.value} | Rule: ${a.rule} | <b>${a.severity}</b></div>
        <div style="opacity:.7;font-size:12px">${a.ts} | ${a.status}</div>
      </div>
    `).join("") || "<span style='opacity:.8'>No alerts.</span>";

  // history
  const h = await postForm({ action:"getHistory", token:getToken(), patientId: profile.patientId, type:"", limit:200 });
  if(!h.ok) return;

  const rows = h.rows || [];
  let html = `<table><thead><tr><th>Time</th><th>Type</th><th>Value</th><th>Unit</th><th>Source</th></tr></thead><tbody>`;
  html += rows.map(r=>`<tr><td>${r.ts}</td><td>${r.type}</td><td>${r.value}</td><td>${r.unit||""}</td><td>${r.source||""}</td></tr>`).join("");
  html += `</tbody></table>`;
  document.getElementById("history").innerHTML = rows.length ? html : "<span style='opacity:.8'>No history.</span>";
}

init();
</script>
</body>
</html>
