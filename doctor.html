<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Doctor Dashboard</title>
  <style>
    body{font-family:Arial;margin:0;background:#0b1220;color:#e8eefc}
    header{padding:16px 18px;background:#121b2f;display:flex;justify-content:space-between;align-items:center}
    .wrap{max-width:1100px;margin:18px auto;padding:0 14px}
    .card{background:#121b2f;border-radius:16px;padding:16px;margin-bottom:14px}
    select,button{padding:10px 12px;border-radius:10px;border:1px solid #2a3557;background:#0b1220;color:#e8eefc}
    button{border:none;background:#ef4444;color:#fff;font-weight:800;cursor:pointer}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid #2a3557;padding:8px;text-align:left;font-size:14px}
  </style>
</head>
<body>
<header>
  <div>
    <div style="font-weight:900">Doctor Dashboard</div>
    <div id="did" style="opacity:.8;font-size:13px"></div>
  </div>
  <button onclick="logout()">Logout</button>
</header>

<div class="wrap">
  <div class="card">
    <h3>Patients</h3>
    <select id="pSel"></select>
    <button style="margin-left:8px;background:#3b82f6" onclick="loadPatient()">Load</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <div id="summary"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyq_bBuTZ9mHP93xgHiCfyrx7ttUZVn8Rnu8oPeKkApaH_rDT0CBa1idgf0BoNkyzpSqQ/exec";

function getProfile(){ const p=localStorage.getItem("profile"); return p?JSON.parse(p):null; }
function getToken(){ return localStorage.getItem("token"); }
function logout(){ localStorage.clear(); location.href="index.html"; }

async function postForm(payload){
  const body = new URLSearchParams(payload).toString();
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded;charset=UTF-8" },
    body
  });
  return res.json();
}

async function init(){
  const profile = getProfile();
  if(!profile || profile.role !== "DOCTOR") return logout();
  document.getElementById("did").textContent = "Doctor ID: " + profile.doctorId;

  const p = await postForm({ action:"getPatients", token:getToken() });
  if(!p.ok) return;

  const sel = document.getElementById("pSel");
  sel.innerHTML = (p.patients||[]).map(x=>`<option value="${x.patientId}">${x.patientId} - ${x.fullName}</option>`).join("");
  loadPatient();
}

async function loadPatient(){
  const pid = document.getElementById("pSel").value;
  if(!pid) return;

  const s = await postForm({ action:"getPatientSummary", token:getToken(), patientId: pid });
  if(!s.ok) return;

  const latest = s.latest || {};
  const latestHtml = Object.keys(latest).map(k=>{
    const r = latest[k];
    return `<div><b>${r.type}</b>: ${r.value} ${r.unit||""} <span style="opacity:.7;font-size:12px">(${r.ts})</span></div>`;
  }).join("") || "<span style='opacity:.8'>No readings.</span>";

  const alertsHtml = (s.alerts||[]).slice(0,10).map(a=>`
    <div style="padding:8px 0;border-bottom:1px solid #2a3557">
      <div><b>${a.type}</b> = ${a.value} | ${a.rule} | <b>${a.severity}</b></div>
      <div style="opacity:.7;font-size:12px">${a.ts}</div>
    </div>
  `).join("") || "<span style='opacity:.8'>No alerts.</span>";

  document.getElementById("summary").innerHTML = `<div>${latestHtml}</div><hr style="border:0;border-top:1px solid #2a3557;margin:12px 0">${alertsHtml}`;

  const h = await postForm({ action:"getHistory", token:getToken(), patientId: pid, type:"", limit:200 });
  if(!h.ok) return;

  const rows = h.rows || [];
  let html = `<table><thead><tr><th>Time</th><th>Type</th><th>Value</th><th>Unit</th><th>Source</th></tr></thead><tbody>`;
  html += rows.map(r=>`<tr><td>${r.ts}</td><td>${r.type}</td><td>${r.value}</td><td>${r.unit||""}</td><td>${r.source||""}</td></tr>`).join("");
  html += `</tbody></table>`;
  document.getElementById("history").innerHTML = rows.length ? html : "<span style='opacity:.8'>No history.</span>";
}

init();
</script>
</body>
</html>
